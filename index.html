<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autohaus Wenzlaff - Toyota Spezialist Berlin</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
    <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{

  --r:#e8001a;--r2:#ff3350;
  --b:#00d4ff;--b2:#0099cc;
  --g:#00ff88;
  --dark:#03080d;--mid:#07121a;--steel:#0e1e2b;--panel:#152030;
  --chrome:#b8ccd8;--white:#eef4f8;
  --gold:#ffcc00;
  --font-display:'Orbitron',monospace;
  --font-ui:'Rajdhani',sans-serif;
  --font-body:'Exo 2',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--white);font-family:var(--font-body);overflow-x:hidden;cursor:none}

/* ─── CURSOR ─── */
#cur{position:fixed;width:10px;height:10px;background:var(--r);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;mix-blend-mode:screen}
#cur2{position:fixed;width:36px;height:36px;border:1px solid var(--b);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s;opacity:.5}
body:hover #cur{opacity:1}

/* ─── LOADER ─── */
#loader{position:fixed;inset:0;z-index:9000;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .8s}
#loader.gone{opacity:0;pointer-events:none}
.load-logo{font-family:var(--font-display);font-size:clamp(1.5rem,5vw,3rem);font-weight:900;letter-spacing:.2em;color:var(--white)}
.load-logo span{color:var(--r)}
.load-bar-wrap{width:280px;height:2px;background:rgba(255,255,255,.08);margin-top:32px;overflow:hidden}
.load-bar{height:100%;width:0;background:linear-gradient(90deg,var(--r),var(--b));animation:loadAnim 1.8s ease forwards}
@keyframes loadAnim{to{width:100%}}
.load-pct{font-family:var(--font-display);font-size:.65rem;letter-spacing:.4em;color:var(--b);margin-top:14px}

/* ─── CANVAS BG ─── */
#bg-canvas{position:fixed;inset:0;z-index:0;opacity:.6}

/* ─── NAV ─── */
nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:18px 48px;display:flex;align-items:center;justify-content:space-between;transition:background .4s,border .4s}
nav.scrolled{background:rgba(3,8,13,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,212,255,.1)}
.nav-logo{font-family:var(--font-display);font-size:1rem;font-weight:900;letter-spacing:.18em;color:var(--white);text-decoration:none}
.nav-logo span{color:var(--r)}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-family:var(--font-ui);font-size:.8rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--chrome);text-decoration:none;transition:color .3s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--b);transform:scaleX(0);transition:transform .3s}
.nav-links a:hover{color:var(--b)}
.nav-links a:hover::after{transform:scaleX(1)}
.nav-tel{font-family:var(--font-display);font-size:.7rem;font-weight:700;letter-spacing:.15em;color:var(--dark);background:var(--r);padding:10px 22px;clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);transition:background .3s,transform .2s;cursor:none;border:none}
.nav-tel:hover{background:var(--r2);transform:scaleX(1.04)}

/* ─── HERO ─── */
.hero{position:relative;height:100vh;min-height:700px;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* Road perspective */
.road{position:absolute;bottom:0;left:50%;width:250%;height:55%;transform:translateX(-50%) perspective(500px) rotateX(60deg) scaleX(2);transform-origin:bottom center;z-index:1}
.road-grid{width:100%;height:100%;background:
  repeating-linear-gradient(90deg,transparent,transparent 99px,rgba(0,212,255,.15) 100px),
  repeating-linear-gradient(0deg,transparent,transparent 49px,rgba(0,212,255,.08) 50px);
  animation:roadMove 2s linear infinite}
@keyframes roadMove{from{background-position:0 0}to{background-position:0 50px}}
.road-center{position:absolute;left:50%;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);transform:translateX(-50%);animation:roadMove 1.5s linear infinite}
.road-fade{position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(to top,var(--dark),transparent);z-index:2}

/* Neon ground glow */
.ground-glow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:800px;height:200px;background:radial-gradient(ellipse at bottom,rgba(232,0,26,.18) 0%,transparent 70%);z-index:2;pointer-events:none}

/* Hero content */
.hero-content{position:relative;z-index:10;text-align:center;opacity:0;transform:translateY(50px);transition:all 1.2s cubic-bezier(.16,1,.3,1)}
.hero-content.show{opacity:1;transform:translateY(0)}

.badge-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.badge{font-family:var(--font-ui);font-size:.7rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;padding:6px 18px;border:1px solid;animation:badgePulse 3s ease-in-out infinite}
.badge-r{color:var(--r);border-color:rgba(232,0,26,.4);background:rgba(232,0,26,.07)}
.badge-b{color:var(--b);border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.07)}
.badge-g{color:var(--g);border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.07)}
@keyframes badgePulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px currentColor}}

.hero-title{font-family:var(--font-display);font-size:clamp(3rem,10vw,8.5rem);font-weight:900;line-height:.88;text-transform:uppercase;letter-spacing:-.02em}
.ht1{display:block;color:var(--white);-webkit-text-stroke:1px rgba(255,255,255,.3)}
.ht2{display:block;background:linear-gradient(135deg,var(--r),#ff6600,var(--r));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(232,0,26,.6));animation:titleGlow 3s ease-in-out infinite}
@keyframes titleGlow{0%,100%{filter:drop-shadow(0 0 40px rgba(232,0,26,.6))}50%{filter:drop-shadow(0 0 80px rgba(232,0,26,.9)) drop-shadow(0 0 120px rgba(232,0,26,.4))}}

.hero-tagline{margin-top:20px;font-family:var(--font-ui);font-size:clamp(.9rem,2vw,1.3rem);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--chrome)}
.hero-loc{margin-top:10px;font-size:.85rem;color:rgba(184,204,216,.45);letter-spacing:.1em}

.hero-btns{margin-top:48px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-fire{font-family:var(--font-ui);font-size:.95rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;background:linear-gradient(135deg,var(--r),#cc0015);color:var(--white);padding:18px 48px;border:none;clip-path:polygon(14px 0,100% 0,calc(100% - 14px) 100%,0 100%);cursor:none;transition:all .3s;text-decoration:none;display:inline-block;position:relative;overflow:hidden}
.btn-fire::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .3s}
.btn-fire:hover{transform:scaleX(1.06);box-shadow:0 0 40px rgba(232,0,26,.5)}
.btn-fire:hover::before{opacity:1}
.btn-cyber{font-family:var(--font-ui);font-size:.9rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;background:transparent;color:var(--b);padding:16px 40px;border:1px solid rgba(0,212,255,.5);clip-path:polygon(14px 0,100% 0,calc(100% - 14px) 100%,0 100%);cursor:none;transition:all .3s;text-decoration:none;display:inline-block}
.btn-cyber:hover{background:rgba(0,212,255,.12);border-color:var(--b);box-shadow:0 0 30px rgba(0,212,255,.2),inset 0 0 30px rgba(0,212,255,.05)}

/* scroll indicator */
.scroll-ind{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:.5;animation:scrollBounce 2s ease-in-out infinite}
@keyframes scrollBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
.scroll-ind span{font-family:var(--font-ui);font-size:.65rem;letter-spacing:.4em;text-transform:uppercase;color:var(--chrome)}
.scroll-arrow{width:20px;height:20px;border-right:1px solid var(--chrome);border-bottom:1px solid var(--chrome);transform:rotate(45deg)}

/* ─── STATS TICKER ─── */
.ticker-wrap{background:var(--r);overflow:hidden;padding:14px 0;position:relative;z-index:10}
.ticker-wrap::before,.ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:1}
.ticker-wrap::before{left:0;background:linear-gradient(to right,var(--r),transparent)}
.ticker-wrap::after{right:0;background:linear-gradient(to left,var(--r),transparent)}
.ticker{display:flex;gap:0;width:max-content;animation:ticker 25s linear infinite}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{font-family:var(--font-display);font-size:.7rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--white);padding:0 40px;white-space:nowrap;display:flex;align-items:center;gap:16px}
.tick-sep{color:rgba(255,255,255,.3);font-size:1.2rem}

/* ─── STATS BAR ─── */
.stats-section{background:var(--steel);border-top:1px solid rgba(0,212,255,.08);border-bottom:1px solid rgba(0,212,255,.08);padding:50px 40px;position:relative;overflow:hidden}
.stats-section::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(0,212,255,.03) 50%,transparent 100%);animation:statShimmer 5s linear infinite}
@keyframes statShimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.stats-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:1px}
.stat-card{padding:32px 24px;text-align:center;background:var(--panel);border:1px solid rgba(0,212,255,.06);transition:border-color .4s,transform .4s;position:relative;overflow:hidden}
.stat-card:hover{border-color:rgba(0,212,255,.25);transform:translateY(-4px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--b),transparent);opacity:0;transition:opacity .4s}
.stat-card:hover::before{opacity:1}
.stat-num{font-family:var(--font-display);font-size:3rem;font-weight:900;line-height:1;color:var(--r)}
.stat-num sup{font-size:1.2rem;color:var(--b);vertical-align:super}
.stat-label{font-family:var(--font-ui);font-size:.7rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--chrome);margin-top:10px}

/* ─── SECTION BASICS ─── */
.sec{max-width:1200px;margin:0 auto;padding:110px 48px}
.sec-tag{font-family:var(--font-display);font-size:.6rem;font-weight:700;letter-spacing:.5em;text-transform:uppercase;color:var(--b);display:flex;align-items:center;gap:14px;margin-bottom:16px}
.sec-tag::before{content:'';width:32px;height:1px;background:var(--b)}
.sec-h{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,3.5rem);font-weight:900;text-transform:uppercase;line-height:1;color:var(--white)}
.sec-h em{font-style:normal;color:var(--r);text-shadow:0 0 40px rgba(232,0,26,.35)}
.sec-p{margin-top:20px;font-size:.95rem;line-height:1.8;color:rgba(184,204,216,.6);max-width:560px}

/* ─── USP ─── */
.usp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:2px;margin-top:64px}
.usp{background:var(--panel);padding:40px 36px;border:1px solid rgba(255,255,255,.04);position:relative;overflow:hidden;transition:all .4s cubic-bezier(.34,1.56,.64,1);cursor:none}
.usp::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,0,26,.04),transparent);opacity:0;transition:opacity .4s}
.usp:hover{transform:translateY(-8px);border-color:rgba(232,0,26,.25);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 0 1px rgba(232,0,26,.15)}
.usp:hover::after{opacity:1}
.usp-num{font-family:var(--font-display);font-size:4rem;font-weight:900;color:rgba(232,0,26,.07);position:absolute;top:16px;right:20px;line-height:1;transition:color .4s}
.usp:hover .usp-num{color:rgba(232,0,26,.12)}
.usp-icon{font-size:2.6rem;margin-bottom:20px;display:block;filter:drop-shadow(0 0 12px rgba(232,0,26,.3))}
.usp-title{font-family:var(--font-ui);font-size:1.15rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--white);margin-bottom:12px}
.usp-body{font-size:.88rem;line-height:1.75;color:rgba(184,204,216,.58)}
.usp-line{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--r),var(--b));transform:scaleX(0);transform-origin:left;transition:transform .5s}
.usp:hover .usp-line{transform:scaleX(1)}

/* ─── VEHICLES ─── */
.vehicles-bg{background:linear-gradient(to bottom,var(--dark),var(--mid),var(--dark));padding:110px 0;position:relative;overflow:hidden}
.vehicles-bg::before{content:'TOYOTA';position:absolute;left:-60px;top:50%;transform:translateY(-50%);font-family:var(--font-display);font-size:22vw;font-weight:900;color:rgba(255,255,255,.015);line-height:1;pointer-events:none;user-select:none}
.v-inner{max-width:1200px;margin:0 auto;padding:0 48px}
.v-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:64px}
.vcard{background:var(--panel);border:1px solid rgba(255,255,255,.05);position:relative;overflow:hidden;transition:all .4s;cursor:none}
.vcard:hover{transform:translateY(-10px) scale(1.01);box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 1px rgba(0,212,255,.2)}
.vcard-top{height:180px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.vcard-top::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(232,0,26,.1) 0%,transparent 70%);transition:opacity .4s}
.vcard:hover .vcard-top::before{opacity:2}
.vcard-emoji{font-size:5.5rem;position:relative;z-index:1;transition:transform .4s;filter:drop-shadow(0 4px 20px rgba(0,0,0,.5))}
.vcard:hover .vcard-emoji{transform:scale(1.1) translateY(-6px)}
.vcard-shine{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.04) 50%,transparent 60%);transform:translateX(-100%);transition:transform .6s}
.vcard:hover .vcard-shine{transform:translateX(100%)}
.vcard-line{height:2px;background:linear-gradient(90deg,var(--r),var(--b),var(--r));background-size:200%;animation:gradMove 3s linear infinite}
@keyframes gradMove{from{background-position:0%}to{background-position:200%}}
.vcard-body{padding:22px 26px 28px}
.vcard-tag{font-family:var(--font-ui);font-size:.65rem;font-weight:700;letter-spacing:.35em;text-transform:uppercase;color:var(--b);margin-bottom:8px}
.vcard-name{font-family:var(--font-ui);font-size:1.4rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--white);margin-bottom:8px}
.vcard-desc{font-size:.84rem;line-height:1.65;color:rgba(184,204,216,.52)}
.vcard-badge{display:inline-flex;align-items:center;gap:6px;margin-top:16px;font-family:var(--font-ui);font-size:.68rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:5px 14px;border:1px solid;border-radius:0}
.badge-gold{color:var(--gold);border-color:rgba(255,204,0,.3);background:rgba(255,204,0,.07)}
.badge-cyan{color:var(--b);border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.07)}
.badge-green{color:var(--g);border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.07)}

/* ─── GARANTIE STRIP ─── */
.gar-strip{background:linear-gradient(135deg,#1a0008,var(--r),#cc0015);padding:56px 48px;position:relative;overflow:hidden}
.gar-strip::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 24px,rgba(0,0,0,.06) 24px,rgba(0,0,0,.06) 48px)}
.gar-strip::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.3),transparent,rgba(0,0,0,.3))}
.gar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-around;flex-wrap:wrap;gap:40px;position:relative;z-index:1}
.gar-item{text-align:center}
.gar-big{font-family:var(--font-display);font-size:3.5rem;font-weight:900;color:var(--white);line-height:1;text-shadow:0 2px 20px rgba(0,0,0,.3)}
.gar-small{font-family:var(--font-ui);font-size:.72rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-top:8px}
.gar-div{width:1px;height:80px;background:rgba(255,255,255,.2)}

/* ─── WORKSHOP ─── */
.ws-grid{display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:center}
@media(max-width:768px){.ws-grid{grid-template-columns:1fr;gap:48px}}
.ws-visual{position:relative;height:500px;display:flex;align-items:center;justify-content:center}
.ws-center{font-size:10rem;position:relative;z-index:5;filter:drop-shadow(0 0 40px rgba(0,212,255,.2));animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-16px) rotate(2deg)}}
.ws-glow{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.12),transparent 70%);animation:breathe 4s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.orbit{position:absolute;border-radius:50%;border:1px solid;animation:spin linear infinite}
.o1{width:260px;height:260px;border-color:rgba(0,212,255,.2);animation-duration:18s}
.o2{width:360px;height:360px;border-color:rgba(232,0,26,.12);animation-duration:28s;animation-direction:reverse;border-style:dashed}
.o3{width:460px;height:460px;border-color:rgba(255,255,255,.05);animation-duration:45s}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.orbit-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--b);top:-4px;left:50%;transform:translateX(-50%);box-shadow:0 0 12px var(--b)}

.ws-services{display:flex;flex-direction:column;gap:12px;margin-top:40px}
.ws-item{display:flex;align-items:flex-start;gap:18px;padding:20px 24px;background:var(--panel);border:1px solid rgba(255,255,255,.04);border-left:2px solid var(--r);transition:all .3s;position:relative;overflow:hidden;cursor:none}
.ws-item::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(232,0,26,.04),transparent);transform:translateX(-100%);transition:transform .4s}
.ws-item:hover{transform:translateX(6px);border-left-color:var(--b)}
.ws-item:hover::before{transform:translateX(0)}
.ws-item-icon{font-size:1.4rem;flex-shrink:0;margin-top:2px}
.ws-item-t{font-family:var(--font-ui);font-size:1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--white)}
.ws-item-d{font-size:.83rem;color:rgba(184,204,216,.5);margin-top:4px}

/* ─── CONTACT ─── */
.contact-wrap{background:var(--mid);padding:110px 0;position:relative;overflow:hidden}
.contact-wrap::before{content:'KONTAKT';position:absolute;right:-40px;bottom:-60px;font-family:var(--font-display);font-size:18vw;font-weight:900;color:rgba(255,255,255,.018);line-height:1;pointer-events:none;user-select:none}
.c-inner{max-width:1200px;margin:0 auto;padding:0 48px}
.c-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;margin-top:64px}
@media(max-width:768px){.c-grid{grid-template-columns:1fr}}
.c-rows{display:flex;flex-direction:column;gap:12px}
.c-row{display:flex;align-items:flex-start;gap:20px;padding:20px 24px;background:var(--panel);border:1px solid rgba(255,255,255,.04);transition:all .3s;cursor:none}
.c-row:hover{border-color:rgba(0,212,255,.2);transform:translateX(4px)}
.c-ico{font-size:1.6rem;flex-shrink:0}
.c-lbl{font-family:var(--font-ui);font-size:.65rem;font-weight:700;letter-spacing:.35em;text-transform:uppercase;color:var(--b);margin-bottom:5px}
.c-val{font-size:1rem;font-weight:500;color:var(--white)}
.c-val a{color:inherit;text-decoration:none;transition:color .3s}
.c-val a:hover{color:var(--b)}

.hours-panel{background:var(--panel);border:1px solid rgba
